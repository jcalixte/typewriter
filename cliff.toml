# git-cliff configuration — generates CHANGELOG.md from conventional commits.
# The template emits the heading levels the website's changelog parser expects:
#   ###  [version] — date        (a release)
#   #### Group                   (Added / Changed / Fixed)
#   -    **scope:** message       (one per commit)
# The `## Firmware` / `## Installer` stream headers and the file preamble are
# added by the `just changelog` recipe, which runs git-cliff once per stream.
[changelog]
header = ""
# Unreleased commits (no tag yet) are omitted — this is a shipped-releases
# changelog. The publish flow tags before generating, so a new release is never
# "unreleased" at generation time.
body = """
{% if version -%}
### [{{ version | trim_start_matches(pat="firmware-v") | trim_start_matches(pat="installer-v") }}]{% if timestamp %} — {{ timestamp | date(format="%Y-%m-%d") }}{% endif %}
{% for group, commits in commits | group_by(attribute="group") -%}
#### {{ group }}
{% for commit in commits -%}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}
{% endfor %}
{% endfor -%}
{% endif -%}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
# Map commit types to human-facing groups; alphabetical order (Added < Changed <
# Fixed) happens to be the order we want. Everything else is dropped as noise.
# The installer (macOS CLI) is its own stream — drop its commits here by SCOPE,
# not by path: installer commits often also touch the workspace root, so a path
# filter leaks them into the firmware changelog.
commit_parsers = [
  # Not firmware: the macOS installer, the 3D-printed case, design docs (QFD /
  # quality-house), benchmarks, prototype spikes, and build/provisioning tooling.
  { field = "scope", pattern = "^(installer|case|quality-house|qfd|bench|sd_bench|spikes|justfile|provision|provisioning|docs)$", skip = true },
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^perf", group = "Changed" },
  { message = ".*", skip = true },
]
filter_commits = true
topo_order = false
sort_commits = "oldest"
